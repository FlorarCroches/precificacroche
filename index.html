<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Florar Crochês - Precificação</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#F8F3EE;
padding:20px;
}

.container{
max-width:850px;
margin:auto;
background:#fff;
padding:30px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.10);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo h1{
color:#8B5E3C;
font-size:42px;
}

.logo p{
color:#8B5E3C;
font-size:18px;
}

h2{
color:#8B5E3C;
margin-top:20px;
margin-bottom:10px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
color:#6b4c34;
}

input, textarea{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #d8d8d8;
border-radius:10px;
font-size:15px;
}

textarea{
height:90px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}

.btn-calcular{
background:#8B5E3C;
color:white;
}

.btn-calcular:hover{
background:#734b2d;
}

.btn-futuro{
background:#c7b8cf;
cursor:pointer;
}

.btn-futuro:hover{
background:#b7a6c0;
}
  
.btn-limpar{
background:#B08A68;
color:white;
}

.btn-orcamento{
background:#6b4c34;
color:white;
}

.resultado{
background:#F4ECE5;
padding:20px;
margin-top:20px;
border-radius:15px;
display:none;
}

.orcamento{
background:#F4ECE5;
padding:20px;
margin-top:20px;
border-radius:15px;
display:none;
}

.erro{
color:red;
font-weight:bold;
margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<h1>🌷 FLORAR CROCHÊS</h1>
<p>Arte que floresce em cada ponto</p>
</div>

<h2>Dados da Peça</h2>

<label>Nome da peça</label>
<input type="text" id="nomePeca" placeholder="Ex: Bolsa Florença">

<label>Descrição da peça</label>
<textarea id="descricao" placeholder="Descreva sua peça"></textarea>

<h2>Custos</h2>

<label>Valor dos insumos (€)</label>
<input type="number" id="insumos" step="0.01">

<label>Quantidade de rolos utilizados</label>
<input type="number" id="quantidadeLinhas" step="0.01">

<label>Valor de cada rolo (€)</label>
<input type="number" id="valorRolo" step="0.01">

<label>Horas trabalhadas</label>
<input type="number" id="horas" step="0.01">

<label>Valor da hora (€)</label>
<input type="number" id="valorHora" step="0.01">

<h2>Venda</h2>

<label>Lucro desejado (%)</label>
<input type="number" id="lucro" step="0.01">

<label>Desconto para atacado (%)</label>
<input type="number" id="atacado" step="0.01">

<button onclick="calcular()">🧶 Calcular</button>
<button onclick="limparCampos()">🧹 Limpar</button>

<button class="btn-orcamento btn-futuro" onclick="versaoFutura()">
📄 Gerar Orçamento (Versão 1.1)
</button>

<div id="erro" class="erro"></div>

<div id="resultado" class="resultado"></div>

<div id="orcamento" class="orcamento"></div>

<script>

function calcular() {
alert("CALCULAR FUNCIONA");
}
function limparCampos() {
alert("LIMPAR FUNCIONA");
}

let precoFinalGlobal = 0;
let nomePeca = document.getElementById("nomePeca").value.trim();
let insumos = parseFloat(document.getElementById("insumos").value);
let quantidadeLinhas = parseFloat(document.getElementById("quantidadeLinhas").value);
let valorRolo = parseFloat(document.getElementById("valorRolo").value);
let horas = parseFloat(document.getElementById("horas").value);
let valorHora = parseFloat(document.getElementById("valorHora").value);
let lucro = parseFloat(document.getElementById("lucro").value);
let atacado = parseFloat(document.getElementById("atacado").value);

document.getElementById("erro").innerHTML = "";

// validação
if (
nomePeca === "" ||
isNaN(insumos) ||
isNaN(quantidadeLinhas) ||
isNaN(valorRolo) ||
isNaN(horas) ||
isNaN(valorHora) ||
isNaN(lucro)
) {
document.getElementById("erro").innerHTML =
"⚠️ Preencha todos os campos obrigatórios.";
return;
}

if (
insumos < 0 ||
quantidadeLinhas < 0 ||
valorRolo < 0 ||
horas < 0 ||
valorHora < 0 ||
lucro < 0
) {
document.getElementById("erro").innerHTML =
"⚠️ Os valores devem ser maiores que zero.";
return;
}

if (atacado === "" || isNaN(atacado)) {
atacado = 0;
}

// cálculos
let custoLinhas = quantidadeLinhas * valorRolo;
let maoDeObra = horas * valorHora;
let custoTotal = insumos + custoLinhas + maoDeObra;
let valorLucro = custoTotal * (lucro / 100);
let precoFinal = custoTotal + valorLucro;
let precoAtacado = precoFinal - (precoFinal * (atacado / 100));

precoFinalGlobal = precoFinal;

// 🔥 MOSTRAR LOGO ABAIXO DO BOTÃO
const resultado = document.getElementById("resultado");
resultado.style.display = "block";

resultado.innerHTML = `
<h2>📊 Resultado da Precificação</h2>

<p><strong>Peça:</strong> ${nomePeca}</p>
<hr>

<p>💎 Insumos: € ${insumos.toFixed(2)}</p>
<p>🧶 Linhas: € ${custoLinhas.toFixed(2)}</p>
<p>⏰ Mão de obra: € ${maoDeObra.toFixed(2)}</p>

<p><strong>Custo total:</strong> € ${custoTotal.toFixed(2)}</p>
<p><strong>Lucro:</strong> € ${valorLucro.toFixed(2)}</p>

<hr>

<h3>💰 Preço final: € ${precoFinal.toFixed(2)}</h3>
<h3>🏷️ Atacado: € ${precoAtacado.toFixed(2)}</h3>
`;
}

function versaoFutura() {

alert(
"📄 A geração de orçamento será disponibilizada na versão 1.1 do PrecificaCrochê."
);

}
  
document.getElementById("erro").innerHTML =
"⚠️ Calcule primeiro o valor da peça.";

return;

}

function limparCampos() {

document.getElementById("nomePeca").value = "";
document.getElementById("descricao").value = "";
document.getElementById("insumos").value = "";
document.getElementById("quantidadeLinhas").value = "";
document.getElementById("valorRolo").value = "";
document.getElementById("horas").value = "";
document.getElementById("valorHora").value = "";
document.getElementById("lucro").value = "";
document.getElementById("atacado").value = "";

document.getElementById("erro").innerHTML = "";

// limpar resultado
document.getElementById("resultado").innerHTML = "";
document.getElementById("resultado").style.display = "none";

// reset global
precoFinalGlobal = 0;

}
</script>

</body>
</html>
