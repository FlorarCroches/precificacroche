<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Florar Crochês - PrecificaCrochê</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#F8F3EE;
padding:20px;
color:#5A4635;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.10);
}

.logo{
text-align:center;
margin-bottom:20px;
}

.logo h1{
font-size:42px;
color:#8B5E3C;
margin-bottom:10px;
}

.slogan{
font-size:16px;
color:#A67C52;
font-style:italic;
}

.introducao{
background:#F4ECE5;
padding:15px;
border-radius:12px;
margin-bottom:25px;
}

.introducao h2{
color:#8B5E3C;
margin-bottom:10px;
}

.introducao p{
line-height:1.5;
}

h2{
margin-top:20px;
margin-bottom:10px;
color:#8B5E3C;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #DDD;
border-radius:10px;
font-size:15px;
}

input:focus,
textarea:focus,
select:focus{
outline:none;
border-color:#8B5E3C;
box-shadow:0 0 5px rgba(139,94,60,0.3);
}

textarea{
height:100px;
resize:vertical;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn-calcular{
background:#8B5E3C;
color:white;
}

.btn-calcular:hover{
background:#73482A;
}

.btn-limpar{
background:#C9B29B;
color:white;
}

.btn-limpar:hover{
background:#B89A7B;
}

.btn-versao{
background:#D8D0C8;
color:#6B4C34;
}

.btn-versao:hover{
background:#C8BDB3;
}

.alerta{
display:none;
margin-top:20px;
padding:15px;
background:#FFF3CD;
border:1px solid #FFE69C;
border-radius:10px;
color:#856404;
font-weight:bold;
}

.resultado{
display:none;
margin-top:20px;
padding:20px;
background:#F4ECE5;
border-radius:15px;
line-height:1.8;
}

.resultado h3{
color:#8B5E3C;
margin-bottom:10px;
}

footer{
margin-top:30px;
text-align:center;
color:#8B5E3C;
}

footer hr{
margin-bottom:15px;
border:none;
height:1px;
background:#DDD;
}

@media(max-width:768px){

.container{
padding:20px;
}

.logo h1{
font-size:32px;
}

button{
font-size:15px;
}

}


</style>

</head>

<body>

<div class="container">

<div class="logo">

<h1>🌷 FLORAR CROCHÊS</h1>

<p class="slogan">
Arte que floresce em cada ponto
</p>

</div>

<div class="introducao">

<h2>PrecificaCrochê</h2>

<p>
Ferramenta desenvolvida para auxiliar artesãs na definição de preços justos e sustentáveis para seus produtos.
</p>

</div>

<label>Moeda</label>

<select id="moeda">

<option value="€">Euro (€)</option>

<option value="R$">Real (R$)</option>

</select>

<h2>Dados da Peça</h2>

<label>Nome da peça</label>

<input
type="text"
id="nomePeca"
placeholder="Ex: Bolsa Florença">

<label>Descrição da peça</label>

<textarea
id="descricao"
placeholder="Descreva sua peça">
</textarea>

<h2>Custos</h2>

<label>Valor dos insumos</label>

<input
type="number"
step="0.01"
id="insumos"
placeholder="Ex: 12">

<label>Quantidade de rolos utilizados</label>

<input
type="number"
step="0.01"
id="qtdRolos"
placeholder="Ex: 1.5">

<label>Valor de cada rolo</label>

<input
type="number"
step="0.01"
id="valorRolo"
placeholder="Ex: 6.50">

<label>Horas trabalhadas</label>

<input
type="number"
step="0.01"
id="horas"
placeholder="Ex: 5">

<label>Valor da hora</label>

<input
type="number"
step="0.01"
id="valorHora"
placeholder="Ex: 8">

<h2>Venda</h2>

<label>Lucro desejado (%)</label>

<input
type="number"
step="0.01"
id="lucro"
placeholder="Ex: 30">

<label>Desconto para atacado (%)</label>

<input
type="number"
step="0.01"
id="atacado"
placeholder="Opcional">

<button
class="btn-calcular"
onclick="calcular()">

🧮 Calcular

</button>

<button
class="btn-limpar"
onclick="limparCampos()">

🧹 Limpar Campos

</button>

<button
class="btn-versao"
onclick="versaoFutura()">

📄 Gerar Orçamento
(Versão 1.1)

</button>

<div id="alerta" class="alerta"></div>

<div id="resultado" class="resultado"></div>

<footer>

<hr>

<p>
Desenvolvido por Florar Crochês
</p>

<p>
Arte que floresce em cada ponto
</p>

</footer>

</div>

<script>

function calcular() {

let moeda =
document.getElementById("moeda").value;

let nomePeca =
document.getElementById("nomePeca").value.trim();

let insumos =
parseFloat(document.getElementById("insumos").value) || 0;

let qtdRolos =
parseFloat(document.getElementById("qtdRolos").value) || 0;

let valorRolo =
parseFloat(document.getElementById("valorRolo").value) || 0;

let horas =
parseFloat(document.getElementById("horas").value) || 0;

let valorHora =
parseFloat(document.getElementById("valorHora").value) || 0;

let lucro =
parseFloat(document.getElementById("lucro").value) || 0;

let atacado =
parseFloat(document.getElementById("atacado").value) || 0;

if(nomePeca === ""){

alert("Informe o nome da peça.");

return;

}

let custoLinhas =
qtdRolos * valorRolo;

let maoDeObra =
horas * valorHora;

let custoTotal =
insumos +
custoLinhas +
maoDeObra;

let valorLucro =
custoTotal * (lucro / 100);

let precoVarejo =
custoTotal + valorLucro;

let precoAtacado =
precoVarejo -
(precoVarejo * (atacado / 100));

let alerta =
document.getElementById("alerta");

if(lucro < 20){

alerta.style.display = "block";

alerta.innerHTML =

"⚠️ Atenção: margens abaixo de 20% podem reduzir sua rentabilidade.";

}else{

alerta.style.display = "none";

}

document.getElementById("resultado").style.display = "block";

document.getElementById("resultado").innerHTML =

"<h3>📊 Resultado Interno</h3>" +

"<p><strong>Peça:</strong> " +
nomePeca +
"</p><hr><br>" +

"<p>💎 Insumos: " +
moeda +
" " +
insumos.toFixed(2) +
"</p>" +

"<p>🧶 Linhas: " +
moeda +
" " +
custoLinhas.toFixed(2) +
"</p>" +

"<p>⏰ Mão de obra: " +
moeda +
" " +
maoDeObra.toFixed(2) +
"</p>" +

"<p>📦 Custo Total: " +
moeda +
" " +
custoTotal.toFixed(2) +
"</p>" +

"<p>📈 Lucro: " +
moeda +
" " +
valorLucro.toFixed(2) +
"</p>" +

"<br>" +

"<h3>💰 Preço Varejo: " +
moeda +
" " +
precoVarejo.toFixed(2) +
"</h3>" +

"<h3>🏷️ Preço Atacado: " +
moeda +
" " +
precoAtacado.toFixed(2) +
"</h3>";

}

function limparCampos(){

document.getElementById("nomePeca").value = "";

document.getElementById("descricao").value = "";

document.getElementById("insumos").value = "";

document.getElementById("qtdRolos").value = "";

document.getElementById("valorRolo").value = "";

document.getElementById("horas").value = "";

document.getElementById("valorHora").value = "";

document.getElementById("lucro").value = "";

document.getElementById("atacado").value = "";

document.getElementById("resultado").innerHTML = "";

document.getElementById("resultado").style.display = "none";

document.getElementById("alerta").style.display = "none";

}

function versaoFutura(){

alert(
"📄 Esta funcionalidade fará parte da versão 1.1 do PrecificaCrochê."
);

}

</script>

</body>
</html>
