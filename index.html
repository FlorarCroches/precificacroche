<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrecificaCrochê</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            padding: 30px;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #6a1b9a;
        }
        label {
            display: block;
            margin-top: 15px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0 15px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #8e24aa;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background: #6a1b9a;
        }
        .resultado {
            margin-top: 20px;
            background: #f3e5f5;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧶 PrecificaCrochê</h1>
        <label>Valor dos insumos (€)</label>
        <input type="number" id="insumos" placeholder="Ex: 5 €">
       
        <label>Quantidade de rolos de linha</label>
        <input type="number" id="quantidadeLinhas" placeholder="Ex: 2 rolos">
       
        <label>Valor total dos rolos de linha (€)</label>
        <input type="number" id="valorLinhas" placeholder="Ex: 10 €">
       
        <label>Horas trabalhadas</label>
        <input type="number" id="horas" placeholder="Ex: 3 horas">
       
        <label>Valor da hora (€)</label>
        <input type="number" id="hora" placeholder="Ex: 8 €">
       
        <label>Lucro desejado (%)</label>
        <input type="number" id="lucro" placeholder="Ex: 30%">
       
        <button onclick="calcular()">Calcular preço</button>
       
        <div class="resultado" id="resultado"></div>
    </div>
    <script>
        function calcular() {
            let insumos = parseFloat(document.getElementById('insumos').value) || 0;
            let quantidadeLinhas = parseFloat(document.getElementById('quantidadeLinhas').value) || 0;
            let valorLinhas = parseFloat(document.getElementById('valorLinhas').value) || 0;
            let horas = parseFloat(document.getElementById('horas').value) || 0;
            let hora = parseFloat(document.getElementById('hora').value) || 0;
            let lucro = parseFloat(document.getElementById('lucro').value) || 0;
           
            let custoInsumos = insumos;
            let custoLinhas = quantidadeLinhas * valorLinhas;
            let maoDeObra = horas * hora;
            let custoTotal = custoInsumos + custoLinhas + maoDeObra;
            let valorLucro = custoTotal * (lucro / 100);
            let precoFinal = custoTotal + valorLucro;
           
            document.getElementById('resultado').innerHTML =
                "Custo de insumos: €" + custoInsumos.toFixed(2) + "<br>" +
                "Custo das linhas: €" + custoLinhas.toFixed(2) + "<br>" +
                "Mão de obra: €" + maoDeObra.toFixed(2) + "<br>" +
                "Lucro: €" + valorLucro.toFixed(2) + "<br><br>" +
                "<b>Preço final sugerido: €" + precoFinal.toFixed(2) + "</b>";
        }
    </script>
</body>
</html>
